<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Ribath ul Quran - We'll be right back. Our system is currently undergoing scheduled maintenance." />
  <title>Maintenance | Ribath ul Quran</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1a6fb5;
      --primary-light: #3a9fe5;
      --primary-dark: #0d4a7a;
      --gold: #c9a84c;
      --gold-light: #e8cc6e;
      --bg-dark: #0a1628;
      --bg-card: rgba(255, 255, 255, 0.04);
      --text-primary: #f0f4f8;
      --text-secondary: rgba(240, 244, 248, 0.6);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background ────────────────────────── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(26, 111, 181, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(26, 111, 181, 0.08) 0%, transparent 50%);
    }

    /* Subtle geometric Islamic pattern overlay */
    .pattern-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='none' stroke='white' stroke-width='0.5'/%3E%3Cpath d='M30 10L50 30L30 50L10 30Z' fill='none' stroke='white' stroke-width='0.5'/%3E%3Ccircle cx='30' cy='30' r='12' fill='none' stroke='white' stroke-width='0.5'/%3E%3C/svg%3E");
      background-size: 60px 60px;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--primary-light);
      opacity: 0;
      animation: float-up linear infinite;
    }

    .particle:nth-child(1)  { left:  8%; animation-duration: 12s; animation-delay: 0s;   }
    .particle:nth-child(2)  { left: 18%; animation-duration: 14s; animation-delay: 2s;   }
    .particle:nth-child(3)  { left: 32%; animation-duration: 10s; animation-delay: 4s;   }
    .particle:nth-child(4)  { left: 45%; animation-duration: 16s; animation-delay: 1s;   }
    .particle:nth-child(5)  { left: 58%; animation-duration: 11s; animation-delay: 3s;   }
    .particle:nth-child(6)  { left: 72%; animation-duration: 13s; animation-delay: 5s;   }
    .particle:nth-child(7)  { left: 85%; animation-duration: 15s; animation-delay: 2.5s; }
    .particle:nth-child(8)  { left: 92%; animation-duration: 12s; animation-delay: 4.5s; }
    .particle:nth-child(9)  { left: 25%; animation-duration: 14s; animation-delay: 6s;   }
    .particle:nth-child(10) { left: 65%; animation-duration: 10s; animation-delay: 7s;   }

    .particle:nth-child(even) {
      background: var(--gold);
      width: 2px;
      height: 2px;
    }

    @keyframes float-up {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Main container ─────────────────────────────── */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 540px;
      padding: 2rem;
      animation: fade-in 1s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ───────────────────────────────────────── */
    .logo-wrapper {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px;
      box-shadow:
        0 0 40px rgba(26, 111, 181, 0.15),
        0 0 80px rgba(26, 111, 181, 0.05);
      animation: pulse-glow 4s ease-in-out infinite;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(26, 111, 181, 0.3));
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(26, 111, 181, 0.15), 0 0 80px rgba(26, 111, 181, 0.05); }
      50%      { box-shadow: 0 0 60px rgba(26, 111, 181, 0.25), 0 0 100px rgba(26, 111, 181, 0.1); }
    }

    /* ── Divider ────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 1.75rem auto;
      max-width: 280px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .divider-diamond {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    /* ── Arabic text ────────────────────────────────── */
    .arabic-text {
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 0.5rem;
      direction: rtl;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    /* ── Heading ────────────────────────────────────── */
    .heading {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Description ────────────────────────────────── */
    .description {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Status card ────────────────────────────────── */
    .status-card {
      margin-top: 2.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .status-label {
      font-weight: 500;
      color: var(--gold-light);
    }

    .progress-bar-track {
      margin-top: 1rem;
      height: 3px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 40%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      animation: indeterminate 2.5s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); width: 40%; }
      50%  { transform: translateX(100%);  width: 60%; }
      100% { transform: translateX(300%);  width: 40%; }
    }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.5;
    }

    .footer a {
      color: var(--primary-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--gold-light);
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }

      .logo {
        width: 90px;
        height: 90px;
        padding: 12px;
      }

      .arabic-text {
        font-size: 1.25rem;
      }

      .heading {
        font-size: 1.4rem;
      }

      .description {
        font-size: 0.875rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="pattern-overlay"></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Main content -->
  <main class="container" role="main">
    <div class="logo-wrapper">
      <div class="logo">
        <img src="/logo.png" alt="Ribath ul Quran" />
      </div>
    </div>

    <p class="arabic-text">نعود إليكم قريباً إن شاء الله</p>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-diamond"></span>
      <span class="divider-line"></span>
    </div>

    <h1 class="heading">We'll Be Right Back</h1>

    <p class="description">
      Our system is currently undergoing scheduled maintenance to serve you better. We appreciate your patience and will be back shortly.
    </p>

    <div class="status-card">
      <div class="status-row">
        <span class="status-dot"></span>
        <span class="status-label">Maintenance in Progress</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill"></div>
      </div>
    </div>

    <p class="footer">
      Ribath ul Quran &middot; <a href="mailto:support@ribathulquran.com">Contact Support</a>
    </p>
  </main>
</body>
</html>
