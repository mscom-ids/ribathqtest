services:
  postgres:
    image: postgres:16-alpine
    container_name: sadath_hifz_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sadath_hifz
    ports:
      - "5432:5432"
    volumes:
      - sadath_hifz_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sadath_hifz"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: sadath_hifz_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sadath.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sadath_hifz_pg: